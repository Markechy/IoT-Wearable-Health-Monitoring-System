<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD DE SENSORES - Estilo de los 80s</title>
    <style>
        body {
            font-family: "Arial", sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            color: #00ffff; /* Cambiado a turquesa */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffeb3b, #4caf50, #2196f3, #9c27b0, #ff00ff);
            background-size: 600% 600%;
            animation: gradient 10s ease infinite;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 100%;
            }
            100% {
                background-position: 100% 0%;
            }
        }

        h1 {
            background-color: #000000; /* Cambiado a negro */
            padding: 20px;
            border-radius: 10px;
            margin: 10px;
            position: relative;
            font-size: 42px; /* Tamaño de fuente reducido */
            letter-spacing: 4px; /* Espaciado entre letras reducido */
            margin-top: 20px; /* Margen superior aumentado */
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); /* Cambiado el color de sombra */
            color: #ffd700; /* Cambiado a tono de amarillo */
        }

        h1::before {
            content: attr(title);
            position: absolute;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff, 0 0 40px #00ffff;
            animation: neon 1.5s ease-in-out infinite alternate;
        }

        @keyframes neon {
            to {
                opacity: 0.8;
                text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 15px #00ffff, 0 0 20px #00ffff;
            }
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .button {
            position: relative;
            overflow: hidden;
            text-align: center;
            background-color: #000000; /* Cambiado a negro */
            border-radius: 8px;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease-in-out;
        }

        .button img {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            cursor: pointer;
        }

        .button a {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #00ffff; /* Cambiado a turquesa */
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        .button:hover {
            transform: scale(1.05);
        }

        .button:hover a {
            opacity: 1;
        }

        /* Estilos para los controles de audio ... */
        audio {
            width: 80%;
            max-width: 400px;
            margin-top: 20px;
            background-color: #ffffff; /* Cambiado a blanco */
            border-radius: 10px;
        }

        audio::-webkit-media-controls-panel {
            background-color: #ffffff; /* Cambiado a blanco */
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1 title="DASHBOARD DE SENSORES">DASHBOARD DE SENSORES</h1>
    <div class="button-container">
        <div class="button">
            <img src='{{url_for('static', filename='imgs/hum.jpg')}}' alt="Aplicación 1">
            <a href="/hum">Humedad</a>
        </div>
        <div class="button">
            <img src='{{url_for('static', filename='imgs/temp.jpg')}}' alt="Aplicación 2">
            <a href="/temp">Temperatura</a>
        </div>
        <div class="button">
            <img src='{{url_for('static', filename='imgs/cocoro.jpg')}}' alt="Aplicación 3">
            <a href="/frec">Pulso</a>
        </div>
        <div class="button">
            <img src='{{url_for('static', filename='imgs/oxi.jpg')}}' alt="Aplicación 4">
            <a href="/oxig">Oxigenacion</a>
        </div>
    </div>
    <!-- Agrega el elemento de audio con controles -->
    <audio controls autoplay>
        <source src='{{url_for('static', filename='musica/AC DC - Shoot to Thrill.mp3')}}' type="audio/mp3">
    </audio>
</body>
</html>
