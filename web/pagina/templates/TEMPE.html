<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico de Temperatura</title>
    <style>
        body {
            background-color: #282c34;
            color: #ffff00; /* Amarillo neon */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: #21252b;
            padding: 10px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        canvas {
            display: block;
            margin-top: 20px;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5); /* Cambiado a amarillo (#ffff00) */
            max-width: 80%; /* Reducido el ancho para mantener la estética */
            box-sizing: border-box;
        }

        #goToMenuButton {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 10px;
            background-color: #ffff00; /* Cambiado a amarillo (#ffff00) */
            color: #282c34;
            border: none;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        #goToMenuButton:hover {
            background-color: #cccc00; /* Amarillo más intenso (#cccc00) */
        }

        h1 {
            color: #ffff00; /* Cambiado a amarillo (#ffff00) */
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8), 0 0 20px rgba(255, 255, 0, 0.8);
            margin: 0;
        }

        h1.neon {
            position: relative;
            display: inline-block;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8), 0 0 20px rgba(255, 255, 0, 0.8);
            animation: neon 1.5s ease-in-out infinite alternate;
        }

        @keyframes neon {
            to {
                opacity: 0.8;
                text-shadow: 0 0 5px rgba(255, 255, 0, 0.8), 0 0 10px rgba(255, 255, 0, 0.8), 0 0 15px rgba(255, 255, 0, 0.8);
            }
        }

        /* Estilos para el selector */
        #selector-container {
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .selector {
            padding: 10px;
            border: 1px solid #cccc00; /* Amarillo neon */
            background-color: #cccc00; /* Amarillo neon */
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .selector:hover {
            background-color: #b3b300; /* Amarillo más intenso (#b3b300) */
            border-color: #b3b300; /* Amarillo más intenso (#b3b300) */
        }
    </style>
</head>
<body>
    <header>
        <br>
        <h1 class="neon">Temperatura</h1>
        <a href="/" id="goToMenuButton">Ir a Menú</a>
    </header>
    <canvas id="temperaturaChart" width="400" height="200"></canvas>
    <form method="POST">
        <div id="selector-container">
            <select name="period_selector" class="selector" onchange="seleccionarPeriodo(this.value)">
                <option value="semana">Ultima semana</option>
                <option value="dia">Ultimo día</option>
                <option value="hora">Ultima hora</option>
            </select>
        </div>
        <br>
        <center>
            <button type="submit">Submit</button>
        </center>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var temperaturas = {{datos_temp}}; // Ejemplo, temperaturas en grados Celsius

            var colores = temperaturas.map(function(temp) {
                if (temp >= 38.5) {
                    return 'rgba(255, 255, 0, 0.7)'; // Amarillo para muy caliente
                } else if (temp >= 28 && temp < 38.5) {
                    return 'rgba(255, 165, 0, 0.7)'; // Naranja para templado
                } else {
                    return 'rgba(255, 255, 255, 0.7)'; // Blanco para muy frío
                }
            });

            var datos = {
                labels: {{etiquetas|safe}},
                datasets: [{
                    label: 'Temperatura',
                    backgroundColor: colores,
                    borderColor: colores,
                    data: temperaturas,
                    fill: true
                }]
            };

            var ctx = document.getElementById('temperaturaChart').getContext('2d');
            var temperaturaChart = new Chart(ctx, {
                type: 'bar',
                data: datos,
                options: {
                    scales: {
                        x: [{
                            scaleLabel: {
                                display: true,
                                labelString: 'Segundos'
                            }
                        }],
                        y: [{
                            ticks: {
                                beginAtZero: true,
                                max: 40 // Ajustamos la escala para mejor representación
                            },
                            scaleLabel: {
                                display: true,
                                labelString: 'Temperatura (°C)'
                            }
                        }]
                    }
                }
            });

            function seleccionarPeriodo(periodo) {
                console.log('Periodo seleccionado:', periodo);
            }
        });
    </script>
</body>
</html>
