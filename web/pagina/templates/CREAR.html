<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Creacion de cuentas.</title>
    <link href="css/master.css" rel="stylesheet" type="text/css">
    <style>
        body {
            font-family: "Arial", sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(45deg, #ff0000, #ff9900, #ffeb3b, #4caf50, #2196f3, #9c27b0, #ff00ff);
            background-size: 600% 600%;
            animation: gradient 10s ease infinite;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 100%;
            }
            100% {
                background-position: 100% 0%;
            }
        }

        .login-container {
            background-color: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            background-color: #000000;
            padding: 20px;
            border-radius: 10px;
            margin: 10px;
            position: relative;
            font-size: 42px;
            letter-spacing: 4px;
            margin-top: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            color: #ffd700;
        }

        h1::before {
            content: attr(title);
            position: absolute;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff, 0 0 40px #00ffff;
            animation: neon 1.5s ease-in-out infinite alternate;
        }

        label, input {
            color: orange;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="submit"] {
            color: black;
        }

        .input-group {
            margin-bottom: 20px;
        }

        @keyframes neon {
            to {
                opacity: 0.8;
                text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 15px #00ffff, 0 0 20px #00ffff;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 title="Creacion de Cuenta">Creacion de Cuenta</h1>
        <form method="POST">
            <div class="input-group">
                <br><br>
                <label for="username">Primer Nombre</label>
                <input id="pnombre" name="pnombre" type="text" placeholder="Ingresa primer nombre">
            </div>
            <div class="input-group">
                <label for="username">Segundo Nombre</label>
                <input id="snombre" name="snombre" type="text" placeholder="Ingresa segundo nombre">
            </div>
            <div class="input-group">
                <label for="username">Primer Apellido</label>
                <input id="papellido" name="papellido" type="text" placeholder="Ingresa primer apellido">
            </div>
            <div class="input-group">
                <label for="username">Segundo Apellido</label>
                <input id="sapellido" name="sapellido" type="text" placeholder="Ingresa segundo apellido">
            </div>
            <div class="input-group">
                <label for="username">Fecha de Nacimiento</label>
                <input id="fecha" name="fecha" type="text" placeholder="XXXX-XX-XX">
            </div>
            <div class="input-group">
                <label for="username">Telefono</label>
                <input id="tel" name="tel" type="text" placeholder="Ingresa num de tel.">
            </div>
            <div class="input-group">
                <label for="username">Altura</label>
                <input id="altura" name="altura" type="text" placeholder="Ingresa tu altura: X.XX">
            </div>
            <div class="input-group">
                <label for="username">Peso</label>
                <input id="peso" name="peso" type="text" placeholder="Ingresa tu peso: XX">
            </div>
            <br><br>
            <input type="submit" value="Crear cuenta">
            <br><br>
        </form>
    </div>
</body>
</html>
