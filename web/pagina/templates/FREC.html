<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico de Frecuencia Cardíaca</title>
    <style>
        body {
            background-color: #282c34;
            color: #ff0000; /* Cambiado a rojo (#ff0000) */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: #21252b;
            padding: 10px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        canvas {
            display: block;
            margin-top: 20px;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); /* Cambiado a rojo (#ff0000) */
            max-width: 100%;
            box-sizing: border-box;
        }

        #goToMenuButton {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 10px;
            background-color: #ff0000; /* Cambiado a rojo (#ff0000) */
            color: #282c34;
            border: none;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        #goToMenuButton:hover {
            background-color: #ff0000; /* Cambiado a rojo (#ff0000) */
        }

        h1 {
            color: #ff0000; /* Cambiado a rojo (#ff0000) */
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8), 0 0 20px rgba(255, 0, 0, 0.8); /* Cambiado a rojo (#ff0000) */
            margin: 0;
        }

        h1.neon {
            position: relative;
            display: inline-block;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8), 0 0 20px rgba(255, 0, 0, 0.8); /* Cambiado a rojo (#ff0000) */
            animation: neon 1.5s ease-in-out infinite alternate;
        }

        @keyframes neon {
            to {
                opacity: 0.8;
                text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 10px rgba(255, 0, 0, 0.8), 0 0 15px rgba(255, 0, 0, 0.8); /* Cambiado a rojo (#ff0000) */
            }
        }

        /* Estilos para el selector */
        #selector-container {
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .selector {
            padding: 10px;
            border: 1px solid #ff0000; /* Cambiado a rojo (#ff0000) */
            background-color: #ff0000; /* Cambiado a rojo (#ff0000) */
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header>
        <!-- Eliminé el título "Dashboard de Sensores" -->
        <br>
        <h1 class="neon">Frecuencia Cardíaca</h1>
    </header>
    <canvas id="ecgChart" width="400" height="200"></canvas>
    <form method="POST">
        <!-- Selector -->
        <div id="selector-container">
            <select name="period_selector" class="selector" onchange="seleccionarPeriodo(this.value)">
                <option value="semana">Ultima semana</option>
                <option value="dia">Ultimo día</option>
                <option value="hora">Ultima hora</option>
            </select>
        </div>
        <!-- Submit button -->
        <br>
        <center>
            <button type="submit">Submit</button>
        </center>
    </form>
    <a href="/" id="goToMenuButton">Ir a Menú</a>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var datos = {
                labels: {{etiquetas|safe}},
                datasets: [{
                    label: 'Frecuencia Cardíaca',
                    borderColor: 'rgb(255, 0, 0)', /* Cambiado a rojo (#ff0000) */
                    pointBorderColor: 'rgb(255, 165, 0)',
                    pointBackgroundColor: 'rgb(255, 165, 0)',
                    data: {{datos_frec}},
                    fill: false
                }]
            };

            var ctx = document.getElementById('ecgChart').getContext('2d');
            var ecgChart = new Chart(ctx, {
                type: 'line',
                data: datos,
                options: {
                    scales: {
                        x: [{
                            type: 'linear',
                            position: 'bottom',
                            scaleLabel: {
                                display: true,
                                labelString: 'Tiempo (segs)',
                                fontColor: '#fff'
                            },
                            gridLines: {
                                color: '#fff',
                                zeroLineColor: '#fff'
                            }
                        }],
                        y: [{
                            type: 'linear',
                            position: 'left',
                            scaleLabel: {
                                display: true,
                                labelString: 'BPM',
                                fontColor: '#fff'
                            },
                            gridLines: {
                                color: '#fff',
                                zeroLineColor: '#fff'
                            }
                        }]
                    }
                }
            });

            function seleccionarPeriodo(periodo) {
                // Puedes hacer algo con el periodo seleccionado, como actualizar el gráfico o realizar alguna acción en JavaScript.
                console.log('Periodo seleccionado:', periodo);
            }
        });
    </script>
</body>
</html>
